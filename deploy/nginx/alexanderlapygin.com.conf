# alexanderlapygin.com — Nginx vhost (Beget VPS, 84.54.29.190)
# Source of truth: this file in repo. Установка на VPS — в
# /etc/nginx/sites-available/alexanderlapygin.com.conf, симлинк в
# /etc/nginx/sites-enabled/. После правки — `nginx -t && nginx -s reload`.
#
# Astro config: `trailingSlash: 'never'`. /contact → /contact/index.html
# отдаётся внутренним try_files без 301.
#
# Связанные документы:
#   - runbook.md §2.5 — процедура cutover с release-dir и atomic switch
#   - runbook.md §4   — заголовки безопасности (snippet ниже)
#   - runbook.md §14  — полный текст CSP
#
# Certbot на этом VPS использует authenticator/installer = nginx (не webroot):
# временно правит этот файл при renewal, серверит ACME-challenge, откатывает.
# Поэтому никакой webroot-location для /.well-known/acme-challenge не нужен.
# options-ssl-nginx.conf и ssl-dhparams.pem кладёт certbot-пакет, файлы есть.

# --- www -> apex (HTTPS) ------------------------------------------------

server {
    listen 443 ssl http2;
    server_name www.alexanderlapygin.com;

    ssl_certificate     /etc/letsencrypt/live/alexanderlapygin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alexanderlapygin.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://alexanderlapygin.com$request_uri;
}

# --- HTTP -> HTTPS (apex и www) ----------------------------------------

server {
    listen 80;
    server_name alexanderlapygin.com www.alexanderlapygin.com;

    return 301 https://alexanderlapygin.com$request_uri;
}

# --- Main HTTPS server (apex) ------------------------------------------

server {
    listen 443 ssl http2;
    server_name alexanderlapygin.com;

    ssl_certificate     /etc/letsencrypt/live/alexanderlapygin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alexanderlapygin.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/alexanderlapygin.com/html;
    index index.html;

    # Security & CSP headers — на серверном уровне.
    # Будут перекрыты в любом location, где есть собственный add_header
    # (см. snippet — нужно include повторно).
    include /etc/nginx/snippets/alexanderlapygin-security-headers.conf;

    # --- SBP Payment Demo backend (showcase/payments/sbp) ---------------
    # Node-приложение, управляется systemd-юнитом sbp-backend.service
    # (WorkingDirectory=/var/www/alexanderlapygin.com/legacy/showcase/payments/sbp/backend),
    # слушает 127.0.0.1:3000. API независимо от release-switch'а Astro.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # --- Legacy showcase (типовые демо: SBP, OAuth, telegram-bot) -------
    # Каждое демо — самодостаточный Vite-SPA (свой index.html + assets/).
    # Контент живёт в /var/www/alexanderlapygin.com/legacy/showcase/, ВНЕ
    # release-дерева Astro — переключение `html` symlink его не трогает.
    location ^~ /showcase/ {
        root /var/www/alexanderlapygin.com/legacy;
        include /etc/nginx/snippets/alexanderlapygin-security-headers.conf;

        # backend/ под любым демо — серверный код, наружу не отдаём.
        location ~* /backend(/|$) {
            return 404;
        }

        # Vite-ассеты с хешем (immutable, content-addressed).
        # Regex в кавычках — иначе nginx тащит `{` как начало блока (footgun, см. nginx docs).
        location ~* "/assets/.+-[A-Za-z0-9_-]{8,}\.(?:js|css|woff2?|svg|png|jpe?g|webp|ico)$" {
            include /etc/nginx/snippets/alexanderlapygin-security-headers.conf;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            try_files $uri =404;
        }

        # HTML страницы демо — всегда ревалидировать.
        location ~ \.html$ {
            include /etc/nginx/snippets/alexanderlapygin-security-headers.conf;
            add_header Cache-Control "no-cache" always;
        }

        try_files $uri $uri/index.html =404;
    }

    # Immutable cache для контент-адресуемых ассетов Astro и шрифтов.
    location ~ ^/(_astro|fonts)/ {
        include /etc/nginx/snippets/alexanderlapygin-security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # HTML — всегда ревалидировать.
    location ~ \.html$ {
        include /etc/nginx/snippets/alexanderlapygin-security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # Clean URLs: /contact → /contact/index.html без 301.
    # /garbage → 404 (отдаётся /404.html через error_page ниже).
    location / {
        try_files $uri $uri/index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
        include /etc/nginx/snippets/alexanderlapygin-security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # Compression: gzip всегда, brotli — если модуль собран в nginx.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml application/xml application/json
        application/javascript application/x-javascript image/svg+xml
        font/ttf application/x-font-ttf;

    # brotli on;
    # brotli_types text/plain text/css text/xml application/xml application/json
    #              application/javascript image/svg+xml font/ttf;
}
