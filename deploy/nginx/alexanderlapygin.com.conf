# alexanderlapygin.com — Nginx vhost (Beget VPS, 84.54.29.190)
# Source of truth: this file in repo. Установка на VPS — в
# /etc/nginx/sites-available/alexanderlapygin.com.conf, симлинк в
# /etc/nginx/sites-enabled/. После правки — `nginx -t && nginx -s reload`.
#
# Astro config: `trailingSlash: 'never'`. /contact → /contact/index.html
# отдаётся внутренним try_files без 301.
#
# Связанные документы:
#   - runbook.md §2.5 — процедура cutover с release-dir и atomic switch
#   - runbook.md §4   — заголовки безопасности (snippet ниже)
#   - runbook.md §14  — полный текст CSP
#
# Пути сертификатов и snippet'а ниже — placeholder'ы. Реальные значения
# проверить на VPS:
#   ssh root@84.54.29.190 'ls /etc/letsencrypt/live/ 2>/dev/null; nginx -V 2>&1 | tr " " "\n" | grep -E "with-|brotli"'

# --- www -> apex (HTTPS) ------------------------------------------------

server {
    listen 443 ssl http2;
    server_name www.alexanderlapygin.com;

    ssl_certificate     /etc/letsencrypt/live/alexanderlapygin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alexanderlapygin.com/privkey.pem;

    return 301 https://alexanderlapygin.com$request_uri;
}

# --- HTTP -> HTTPS (apex и www) ----------------------------------------

server {
    listen 80;
    server_name alexanderlapygin.com www.alexanderlapygin.com;

    # ACME-challenge для certbot оставляем доступным по HTTP.
    # Путь зависит от того, как настроен certbot на VPS (webroot vs nginx-plugin).
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://alexanderlapygin.com$request_uri;
    }
}

# --- Main HTTPS server (apex) ------------------------------------------

server {
    listen 443 ssl http2;
    server_name alexanderlapygin.com;

    ssl_certificate     /etc/letsencrypt/live/alexanderlapygin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alexanderlapygin.com/privkey.pem;

    root /var/www/alexanderlapygin.com/html;
    index index.html;

    # Security & CSP headers — на серверном уровне.
    # Будут перекрыты в любом location, где есть собственный add_header
    # (см. snippet — нужно include повторно).
    include /etc/nginx/snippets/alexanderlapygin-security-headers.conf;

    # Immutable cache для контент-адресуемых ассетов Astro и шрифтов.
    location ~ ^/(_astro|fonts)/ {
        include /etc/nginx/snippets/alexanderlapygin-security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # HTML — всегда ревалидировать.
    location ~ \.html$ {
        include /etc/nginx/snippets/alexanderlapygin-security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # Clean URLs: /contact → /contact/index.html без 301.
    # /garbage → 404 (отдаётся /404.html через error_page ниже).
    location / {
        try_files $uri $uri/index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
        include /etc/nginx/snippets/alexanderlapygin-security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # Compression: gzip всегда, brotli — если модуль собран в nginx.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml application/xml application/json
        application/javascript application/x-javascript image/svg+xml
        font/ttf application/x-font-ttf;

    # brotli on;
    # brotli_types text/plain text/css text/xml application/xml application/json
    #              application/javascript image/svg+xml font/ttf;
}
