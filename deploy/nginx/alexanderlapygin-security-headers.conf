# alexanderlapygin.com — Security & CSP headers snippet
# Source of truth: this file in repo. Установка на VPS — в
# /etc/nginx/snippets/alexanderlapygin-security-headers.conf
# Подробности — runbook.md §4 (заголовки) и §14 (CSP).
#
# ВАЖНО: include нужно повторять в каждом location, где есть собственный
# add_header. Nginx-footgun: при появлении add_header во вложенном блоке
# наследование add_header из родителя отключается полностью.

add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self'; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;
